global:
  scrape_interval: 15s
  external_labels:
    monitor: 'codelab-monitor'

scrape_configs:
  - job_name: 'node_exporter'
    scrape_interval: 5s
    static_configs:
      - targets:
          - waiter.ucsd.edu:9100
          - kastner-ml.ucsd.edu:9100
          - fabricant.ucsd.edu:9100
          - fabricant-prod.ucsd.edu:9100

  - job_name: 'dcgm_exporter'
    scrape_interval: 15s
    static_configs:
      - targets:
          - waiter.ucsd.edu:9400
          - kastner-ml.ucsd.edu:9400

  - job_name: 'docker_exporter'
    scrape_interval: 15s
    static_configs:
      - targets:
          - waiter.ucsd.edu:9323
          - kastner-ml.ucsd.edu:9323

  # ansible_deploy_monitor scraped port 9000 from all managed hosts.
  # In NixOS this service is replaced by system.autoUpgrade; these targets
  # will return connection refused until removed or repurposed.
  - job_name: ansible_deploy_monitor
    scrape_interval: 5s
    static_configs:
      - targets:
          - waiter.ucsd.edu:9000
          - kastner-ml.ucsd.edu:9000
          - fabricant-prod.ucsd.edu:9000
          - fabricant.ucsd.edu:9000

  - job_name: ipmi_exporter
    scrape_interval: 15s
    static_configs:
      - targets:
          - localhost:9290
          - waiter.ucsd.edu:9290

  - job_name: 'blackbox_exporter'
    static_configs:
      - targets:
          - blackbox_exporter:9115

  - job_name: website_monitoring
    scrape_interval: 1m
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://e4e.ucsd.edu/
          - https://kastner.ucsd.edu/
          - https://e4e-nas.ucsd.edu:6021/
          - https://labeler.e4e.ucsd.edu/version
          - https://vault.e4e-gateway.ucsd.edu/
          - https://etap.nsf.gov/award/2378/opportunity/10235
          - https://fishsense.e4e.ucsd.edu/
          - https://analytics.fishsense.e4e.ucsd.edu/login/
          - https://orchestrator.fishsense.e4e.ucsd.edu
          - https://orchestrator.fishsense.e4e.ucsd.edu/api/v1/data/ping
          - https://workflows.fishsense.e4e.ucsd.edu/login
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  - job_name: blackbox-ping
    scrape_interval: 1m
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - '1.1.1.1'
          - '8.8.8.8'
          - waiter.ucsd.edu
          - kastner-ml.ucsd.edu
          - fabricant.ucsd.edu
          - fabricant-prod.ucsd.edu
          - e4e-octopi.dynamic.ucsd.edu
          - e4e-gateway.ucsd.edu
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox_exporter:9115

  - job_name: 'octoprint'
    scrape_interval: 5s
    metrics_path: '/plugin/prometheus_exporter/metrics'
    static_configs:
      - targets:
          - 'e4e-octopi.dynamic.ucsd.edu:80'

  - job_name: 'traefik'
    scrape_interval: 15s
    static_configs:
      - targets:
          - fabricant-prod.ucsd.edu:8080

  - job_name: 'temporal'
    scrape_interval: 15s
    static_configs:
      - targets:
          - fishsense-temporal:8000
