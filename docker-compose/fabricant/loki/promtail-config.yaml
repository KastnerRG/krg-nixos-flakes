server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log

  # NixOS: replaced ansible_deploy_logs with systemd journal scraping.
  # The compose.grafana.yml mounts ./ansible.log as /tmp/ansible_deploy.log;
  # Docker will create an empty file there so this job produces no data.
  - job_name: nixos_deploy_logs
    journal:
      max_age: 12h
      labels:
        job: nixos_rebuild
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
