# Minimal PostgreSQL config for the label-studio postgres container.
# listen_addresses must be '*' so Docker containers on the same network can connect.
listen_addresses = '*'
port = 5432
hba_file = '/etc/postgresql/pg_hba.conf'

# Memory (tune these for the host)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
