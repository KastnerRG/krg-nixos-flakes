# Baseline vars for ALL managed hosts (the "secure + up to date by default" set).

# Admin SSH keys — SHARED with the NixOS layer. Edit nix/keys/admins.json (the
# single source of truth, read by nix/users/admin.nix too), NOT here.
#
# Path anchored on inventory_dir (…/ansible/inventory), NOT playbook_dir: it
# resolves to the same repo root for `ansible-playbook` AND ad-hoc `ansible`/`-m
# debug` runs (playbook_dir falls back to cwd in ad-hoc mode, climbing one level
# too far). Assumes the inventory stays at ansible/inventory/.
krg_keys_file: "{{ (inventory_dir | dirname) | dirname }}/nix/keys/admins.json"
admin_ssh_keys: "{{ (lookup('file', krg_keys_file) | from_json)['krg-admin'] }}"

# Break-glass CONSOLE password hash — SHARED with the NixOS layer. Edit
# nix/keys/admin-passwords.json (single source of truth, also read by
# nix/users/admin.nix), NOT here. The same SHA-512 crypt hash works in
# /etc/shadow on Debian and NixOS alike. Empty/absent -> krg-admin stays
# key-only with a locked password. Same inventory_dir anchor as krg_keys_file.
krg_admin_passwords_file: "{{ (inventory_dir | dirname) | dirname }}/nix/keys/admin-passwords.json"
admin_password_hash: "{{ (lookup('file', krg_admin_passwords_file) | from_json).get('krg-admin', '') }}"

# base role
base_timezone: "America/Los_Angeles"

# ssh_hardening
ssh_permit_root: "prohibit-password"   # key-only root (PVE relies on root)
ssh_restrict_algorithms: false         # keep false on clusters (inter-node SSH may use RSA)

# fail2ban
fail2ban_bantime:  "1h"
fail2ban_findtime: "10m"
fail2ban_maxretry: 3

# Trusted networks / Proxmox IPSets — SHARED source of truth at
# nix/networks/trusted.json (also templated into the PVE cluster.fw and read by
# nix krg.firewall). Edit there, not here. (inventory_dir anchor — see krg_keys_file.)
krg_trusted_file: "{{ (inventory_dir | dirname) | dirname }}/nix/networks/trusted.json"
krg_trusted: "{{ lookup('file', krg_trusted_file) | from_json }}"
krg_monitoring_host: "{{ krg_trusted.monitoring_host }}"
# fail2ban allow-list: don't ban the sealab/admin hosts.
krg_trusted_nets: "{{ krg_trusted.ipsets.sealab | map(attribute='cidr') | list }}"
fail2ban_ignoreip: "{{ ['127.0.0.1/8', '::1'] + krg_trusted_nets }}"

# GeoIP CIDR allow-list (issue #74) — SHARED source of truth at
# nix/networks/geoip-<cc>-{v4,v6}.json. Refreshed weekly by the
# fetch-geoip systemd timer on krg-deploy from MaxMind GeoLite2-Country
# (see nix/modules/security/firewall-geoip/maintainer.nix); the seed
# files ship with empty cidrs lists, so the +dc/geoip_us IPSet is empty
# on a fresh fleet — fail-closed: rules referencing it match nothing
# until the timer first runs.
#
# v4 + v6 are concatenated into one list per country because PVE 7+
# IPSets accept mixed-family entries; keeps the cluster.fw template
# simple (one IPSet per country, not two-per-country).
#
# The cluster.fw template emits a `+dc/geoip_us` IPSet from this list.
# Per-guest .fw files reference it for ports that should be open to
# US-routed clients but NOT globally (e.g. Authentik-gated lab web on
# krg-prod 80+443). Strict-only services keep the +dc/ucsd / +dc/sealab
# restriction instead — geoIP is the LOOSEST acceptable source, not
# the default.
krg_geoip_us_v4_file: "{{ (inventory_dir | dirname) | dirname }}/nix/networks/geoip-us-v4.json"
krg_geoip_us_v6_file: "{{ (inventory_dir | dirname) | dirname }}/nix/networks/geoip-us-v6.json"
krg_geoip_us: "{{ (lookup('file', krg_geoip_us_v4_file) | from_json).cidrs + (lookup('file', krg_geoip_us_v6_file) | from_json).cidrs }}"
