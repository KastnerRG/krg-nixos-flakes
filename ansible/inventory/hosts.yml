# Proxmox VE hypervisor hosts. Fill in the rebuilt hosts as they come online.
all:
  children:
    proxmox:
      # Example (uncomment + edit):
      #   hosts:
      #     pve-01:
      #       ansible_host: 137.110.161.10
      #     pve-02:
      #       ansible_host: 137.110.161.11
      hosts: {}
      vars:
        ansible_user: root                       # PVE admin; key-only after hardening
        ansible_python_interpreter: /usr/bin/python3
