# Proxmox VE hypervisor hosts. Fill in the rebuilt hosts as they come online.
all:
  children:
    proxmox:
      hosts:
        fabricant:
          # LOCAL MODE: Ansible runs ON this Proxmox host for now (no SSH).
          # When the dedicated Ansible control server comes online, switch to
          # push mode: drop `ansible_connection` and set `ansible_host` to this
          # host's IP, e.g.
          #   fabricant:
          #     ansible_host: 137.110.161.10
          # (and add the other PVE hosts the same way).
          ansible_connection: local
      vars:
        ansible_user: root                       # PVE admin over SSH; key-only after hardening (push mode; ignored under ansible_connection: local)
        ansible_python_interpreter: /usr/bin/python3   # system python (has python3-apt) — NOT the .venv interpreter
