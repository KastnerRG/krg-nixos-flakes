# Proxmox VE hypervisor hosts. Fill in the rebuilt hosts as they come online.
all:
  children:
    proxmox:
      hosts:
        fabricant:
          ansible_host: fabricant.ucsd.edu
          # Bootstrap fallback (run Ansible locally ON fabricant instead of pushing from krg-deploy):
          # ansible_connection: local
      vars:
        ansible_user: root                       # PVE admin over SSH; key-only after hardening (push mode; ignored under ansible_connection: local)
        ansible_python_interpreter: /usr/bin/python3   # system python (has python3-apt) — NOT the .venv interpreter

# Synology DSM appliance (e4e-nas) is intentionally NOT in this inventory.
# All NAS-related Ansible content (inventory, group_vars, playbook, roles) is
# isolated under `ansible/synology/` so a future decommission is `rm -rf
# ansible/synology/` with no other edits. See ansible/synology/README.md.
