# Harden the Proxmox hypervisor hosts. This closes the breach vector
# (dictionary attack on root SSH) and adds brute-force banning.
#
#   ansible-galaxy collection install -r ../requirements.yml
#   ansible-playbook playbooks/harden.yml --check    # dry run first
#   ansible-playbook playbooks/harden.yml
#
# SAFETY: keep a Proxmox console session open the first time, and verify you can
# open a NEW ssh session (key-based) before closing your current one.
- name: Harden Proxmox hosts
  hosts: proxmox
  gather_facts: true
  roles:
    - krg_admin               # named break-glass sudo admin (before the SSH lockdown)
    - proxmox_ssh_hardening
    - proxmox_fail2ban
