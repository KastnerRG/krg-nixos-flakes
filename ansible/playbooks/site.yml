# krg-infra — make managed hosts secure + up to date by default.
#
#   ansible-galaxy collection install -r ../requirements.yml
#   ansible-playbook playbooks/site.yml --check    # dry run first
#   ansible-playbook playbooks/site.yml
#
# SAFETY: keep a Proxmox console session open the first time, and verify you can
# open a NEW key-based ssh session before closing your current one.
- name: Baseline (secure + up to date by default)
  hosts: all
  become: true
  roles:
    # The full baseline lives in the `base` role: OS basics (timezone, packages,
    # unattended upgrades, sysctl) PLUS the security + monitoring stack it composes
    # in order — krg_admin, ssh_hardening, fail2ban, monitoring, oec_qualys_trellix,
    # ad_client. See roles/base/tasks/main.yml. Set `oec_installer` to enroll
    # Qualys/Trellix; pass `-e ad_join_password=...` the first time to join the AD.
    - base

# Proxmox/PVE perimeter firewall (source restriction; pairs with the in-guest
# NixOS firewall). cluster.fw IPSets come from the shared nix/networks/trusted.json.
- name: Proxmox perimeter firewall
  hosts: proxmox
  become: true
  roles:
    - proxmox_firewall      # cluster.fw + per-guest <vmid>.fw

# Storage — exports backed by a ZFS dataset on the hypervisor's pool, plus the pool
# capacity policy (cap VM storage so user data wins contention). Deliberately
# host-scoped to `fabricant` (NOT the `proxmox` group): other PVE hosts must not
# expose this NFS. Pool/shares/clients/quotas live in host_vars/fabricant.yml. The
# NFS port (tcp/2049) is opened in fabricant's per-node host.fw via the
# proxmox_firewall play above (proxmox_host_fw_rules in host_vars).
- name: Storage — ZFS limits + NFS server (fabricant only)
  hosts: fabricant
  become: true
  roles:
    - zfs_limits      # cap VM disk storage (rpool/data) so user/NFS data wins
    - nfs_server      # NFSv4 exports on rpool/nfs (home + scratch-krg)
