# Ansible config for krg-infra Proxmox host management (the hypervisor layer).
# The NixOS flake (repo root) handles the guests; this handles the PVE hosts.
[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = yaml
interpreter_python  = auto_silent
forks               = 10

[ssh_connection]
pipelining = True
