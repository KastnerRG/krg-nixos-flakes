# Ansible config for krg-infra Proxmox host management (the hypervisor layer).
# The NixOS flake (repo root) handles the guests; this handles the PVE hosts.
[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = True
retry_files_enabled = False
# The old `yaml` stdout callback (community.general.yaml) was removed in
# community.general 12.0.0; the built-in `default` callback + result_format=yaml
# is the supported replacement (ansible-core >= 2.13).
stdout_callback     = default
result_format       = yaml
interpreter_python  = auto_silent
forks               = 10

[ssh_connection]
pipelining = True
