# Overridable in group_vars/host_vars (see group_vars/proxmox.yml).
proxmox_admin_ssh_keys: []
proxmox_ssh_permit_root: "prohibit-password"
proxmox_ssh_restrict_algorithms: false
# ed25519-only set, matching the NixOS guest policy (modules/base.nix).
proxmox_ssh_pubkey_algorithms: "ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519@openssh.com,sk-ssh-ed25519-cert-v01@openssh.com"
