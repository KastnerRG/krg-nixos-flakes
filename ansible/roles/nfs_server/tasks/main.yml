# krg-infra nfs_server — NFS exports backed by ZFS datasets, served from the
# Proxmox HOST. fabricant-only (see the `hosts: fabricant` play in site.yml).
#
# WHY ON THE HOST: the ZFS pool lives on the hypervisor, so exporting from a guest
# would mean passing the pool/zvols through. Scope is deliberately fabricant-only —
# keep this OUT of group_vars/proxmox.yml so other PVE hosts never expose it.
#
# FIREWALL (Model 3: in-guest owns ports, Proxmox owns sources): this role opens
# NOTHING. The perimeter (cluster.fw / per-node host.fw — proxmox_firewall role)
# DROPs inbound by default, so tcp/2049 must be allowed to the NFS clients there
# before this is reachable. See the firewall follow-up in the role's notes.
#
# ID MAPPING: clients map AD users to uid/gid algorithmically (deterministic from
# the SID, identical on every host — nix krg.adClient / ansible ad_client), so a
# plain sec=sys export lines up across hosts without idmapd doing the heavy lifting.

- name: Assert a ZFS pool is configured
  ansible.builtin.assert:
    that:
      - nfs_pool | length > 0
    fail_msg: >-
      nfs_pool is empty. Set it in inventory/host_vars/fabricant.yml to the pool
      shown by `zpool list` on fabricant — do NOT guess, pool names differ per box.

- name: Install NFS kernel server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true
    cache_valid_time: 3600

# --- ZFS datasets ----------------------------------------------------------
# community.general.zfs is idempotent (creates if missing, reconciles props) —
# unlike disko on the NixOS side, this is safe to re-run on a live pool.
- name: Create parent ZFS dataset for NFS shares
  community.general.zfs:
    name: "{{ nfs_parent_dataset }}"
    state: present
    # mountpoint pins the subtree at nfs_root; reservation (if set) guarantees it a
    # floor; quota (if set) caps it. On a shared pool we reserve (prioritize user
    # data) and cap the VM dataset instead (zfs_limits role).
    extra_zfs_properties: >-
      {{ nfs_parent_props
         | combine({'mountpoint': nfs_root})
         | combine({'reservation': nfs_parent_reservation} if (nfs_parent_reservation | length > 0) else {})
         | combine({'quota': nfs_parent_quota} if (nfs_parent_quota | length > 0) else {}) }}

- name: Create per-share ZFS datasets
  community.general.zfs:
    name: "{{ nfs_parent_dataset }}/{{ item.name }}"
    state: present
    # Children inherit mountpoint (-> <nfs_root>/<name>) and the parent props;
    # dataset_props only overrides (e.g. recordsize=1M, snapshot cadence).
    extra_zfs_properties: "{{ item.dataset_props | default({}) }}"
  loop: "{{ nfs_exports }}"
  loop_control:
    label: "{{ nfs_parent_dataset }}/{{ item.name }}"

# --- ZFS auto-snapshots ----------------------------------------------------
# Make the com.sun:auto-snapshot property the shares carry actually DO something:
# Proxmox/Debian has no NixOS services.zfs.autoSnapshot, so without these timers the
# property is inert and the homes get no snapshots. --default-exclude keeps it scoped
# to opted-in datasets only — see defaults/main.yml + the .service template for why.
- name: Install zfs-auto-snapshot
  ansible.builtin.apt:
    name: zfs-auto-snapshot
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: zfs_auto_snapshot_enabled

# The Debian package ships its OWN cron entries (cron.d + cron.{hourly,daily,weekly,
# monthly}) with upstream retention and NO --default-exclude. Left in place they'd
# (a) snapshot every PVE/VM dataset and (b) fight our timers' --keep on the shared
# labels (whichever runs last sets the floor). Remove them — our systemd timers are
# the single scheduler. (dpkg may restore these on a package upgrade; the next
# Ansible run removes them again.)
- name: Remove the package's stock cron entries (our timers replace them)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/cron.d/zfs-auto-snapshot
    - /etc/cron.hourly/zfs-auto-snapshot
    - /etc/cron.daily/zfs-auto-snapshot
    - /etc/cron.weekly/zfs-auto-snapshot
    - /etc/cron.monthly/zfs-auto-snapshot
  when: zfs_auto_snapshot_enabled

- name: Install zfs-auto-snapshot service units (one per cadence)
  ansible.builtin.template:
    src: zfs-auto-snapshot.service.j2
    dest: "/etc/systemd/system/zfs-auto-snapshot-{{ item.label }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ zfs_auto_snapshot_cadences }}"
  loop_control:
    label: "zfs-auto-snapshot-{{ item.label }}.service"
  when: zfs_auto_snapshot_enabled
  notify: reload systemd

- name: Install zfs-auto-snapshot timer units (one per cadence)
  ansible.builtin.template:
    src: zfs-auto-snapshot.timer.j2
    dest: "/etc/systemd/system/zfs-auto-snapshot-{{ item.label }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ zfs_auto_snapshot_cadences }}"
  loop_control:
    label: "zfs-auto-snapshot-{{ item.label }}.timer"
  when: zfs_auto_snapshot_enabled
  notify: reload systemd

# Only the TIMERS are enabled (the services are oneshots the timers pull in). A
# changed unit is picked up by daemon_reload below; daemon-reload also re-arms timers,
# so an edited OnCalendar/--keep takes effect without an explicit restart.
- name: Enable + start the zfs-auto-snapshot timers
  ansible.builtin.systemd_service:
    name: "zfs-auto-snapshot-{{ item.label }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ zfs_auto_snapshot_cadences }}"
  loop_control:
    label: "zfs-auto-snapshot-{{ item.label }}.timer"
  when: zfs_auto_snapshot_enabled

# --- NFS server config -----------------------------------------------------
- name: Configure NFS protocol versions (v4-only by default)
  ansible.builtin.template:
    src: nfs.conf.j2
    dest: /etc/nfs.conf.d/krg-nfs.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart nfs server

- name: Set NFSv4 idmap domain
  community.general.ini_file:
    path: /etc/idmapd.conf
    section: General
    option: Domain
    value: "{{ nfs_idmap_domain }}"
    mode: "0644"
  notify: restart nfs server

# Durable boot-mount guarantee. The export datasets MUST be mounted before
# nfs-server's `exportfs` reads /etc/exports.d (loading the kernel export table), else
# it exports the bare (empty) mountpoint. Proxmox/Debian mount ZFS at boot from
# /etc/zfs/zfs-list.cache/<pool> via zfs-mount-generator; datasets created after that
# cache was last refreshed (our <pool>/nfs/* shares) get no generated .mount unit and
# silently stay unmounted on reboot. This oneshot re-mounts them mechanism-independently
# AND verifies each export is really mounted, failing if not; nfs-server Requires= it
# (below), so a failed mount blocks nfs-server instead of exporting empty dirs. That
# Requires= is the sole pull-in (no enable).
- name: Install the krg-nfs premount unit (mount + verify export datasets before nfs-server)
  ansible.builtin.template:
    src: krg-nfs-premount.service.j2
    dest: /etc/systemd/system/krg-nfs-premount.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart nfs server

- name: Ensure nfs-server systemd drop-in dir exists
  ansible.builtin.file:
    path: /etc/systemd/system/nfs-server.service.d
    state: directory
    mode: "0755"

- name: Require + order nfs-server after the export-dataset premount
  ansible.builtin.copy:
    dest: /etc/systemd/system/nfs-server.service.d/10-zfs.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (krg-infra nfs_server). nfs-server's `exportfs` must read
      # /etc/exports.d only AFTER the export datasets are mounted, or it exports the
      # bare (empty) mountpoint. krg-nfs-premount.service mounts them and verifies each
      # export is a real mountpoint, failing if not. Requires= makes that failure BLOCK
      # nfs-server (fail closed) instead of exporting empty dirs, and is the single
      # thing that pulls the premount unit in (it has no [Install]).
      [Unit]
      Requires=krg-nfs-premount.service
      After=krg-nfs-premount.service
  notify:
    - reload systemd
    - restart nfs server

# /etc/exports.d isn't always shipped by the package (this PVE host had it absent),
# and `template` won't create a missing parent — make sure it exists first.
- name: Ensure /etc/exports.d exists
  ansible.builtin.file:
    path: /etc/exports.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write NFS exports
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports.d/krg-nfs.exports
    owner: root
    group: root
    mode: "0644"
  notify: reexport nfs

- name: Enable + start nfs-server
  ansible.builtin.systemd_service:
    name: nfs-server
    enabled: true
    state: started
    daemon_reload: true
