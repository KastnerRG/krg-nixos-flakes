# Break-glass administrator on every host. Mirrors the NixOS convention
# (nix/users/admin.nix: krg-admin in wheel + passwordless sudo, key-only).
krg_admin_user: "krg-admin"
krg_admin_comment: "KRG break-glass administrator"
krg_admin_shell: "/bin/bash"
krg_admin_extra_groups: []          # 'sudo' is added automatically
krg_admin_sudo_nopasswd: true       # key-only account, so sudo must be NOPASSWD to be usable
# Defaults to the shared admin keys (nix/keys/admins.json via group_vars).
krg_admin_ssh_keys: "{{ admin_ssh_keys | default([]) }}"
# Break-glass CONSOLE password hash, from the shared nix/keys/admin-passwords.json
# (via group_vars admin_password_hash). Empty -> account stays key-only with a
# locked password (the original behavior). SSH remains key-only regardless; this
# is purely for the physical console when SSH/network is down. Mirrors
# nix/users/admin.nix's hashedPassword.
krg_admin_password_hash: "{{ admin_password_hash | default('') }}"
