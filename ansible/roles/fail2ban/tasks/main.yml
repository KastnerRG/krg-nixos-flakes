# Brute-force banning — mitigates the dictionary-attack class that caused the
# breach. CROSS-REFERENCE: counterpart of the NixOS krg.fail2ban module
# (nix/modules/security/fail2ban.nix); keep ban policy roughly aligned.
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure fail2ban (jail.local)
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
