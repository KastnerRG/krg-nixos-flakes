# Mirrors the OS baseline in nix/profiles/base.nix (see the cross-reference note
# in tasks/main.yml). Override in group_vars.
base_timezone: "America/Los_Angeles"
base_packages:
  - sudo
  - git
  - vim
  - htop
  - tmux
  - polkitd
  - pkexec
  - python3.13-venv        # PEP 668 / externally-managed: need venvs for pip tooling
  - unattended-upgrades
base_packages_absent:
  - cups-browsed
  - cups-filters
  - cups-filters-core-drivers
  - libcupsfilters2t64
base_sysctl:
  kernel.sysrq: 1
