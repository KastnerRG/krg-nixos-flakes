---
# Exporter (read-only): snapshot the live DSM SMB global settings so the drift_exporter
# can diff them against spec/krg-prod/smb-globals.yml. Paired half of the role (ADR 0001
# — UI = drift). Run: ansible-playbook playbooks/synology.yml --tags export

- name: Ensure the export dir exists on the control node
  ansible.builtin.file:
    path: "{{ synology_export_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true

- name: Get live SMB global settings (version 3)
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.FileServ.SMB method=get version=3"
  register: smb_get
  changed_when: false
  check_mode: false

- name: Write the live-state snapshot
  ansible.builtin.copy:
    dest: "{{ synology_export_dir }}/{{ inventory_hostname }}-smb.yml"
    mode: "0600"
    content: |
      # Live DSM SMB globals on {{ inventory_hostname }} — synology_smb exporter.
      # raw synowebapi SYNO.Core.FileServ.SMB get (version 3). synowebapi prints a
      # "[Line N] Exec WebAPI: ..." preamble before the JSON — strip to the first '{'.
      smb_raw: {{ smb_get.stdout_lines | to_json }}
  delegate_to: localhost
