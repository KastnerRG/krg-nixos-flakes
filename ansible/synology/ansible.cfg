# Ansible config for the Synology DSM (e4e-nas) management subtree.
#
# Self-contained: roles, playbook, inventory, group_vars are ALL under this dir.
# Decommissioning the NAS is one command: `rm -rf ansible/synology/`.
#
# Run from this dir:
#   cd ansible/synology
#   ansible-playbook playbook.yml
#   ansible-playbook playbook.yml --check --diff
#   ansible-playbook playbook.yml --tags export
#   ansible-playbook playbook.yml --tags acls-recursive   # post-AD-join one-shot
#   ansible-playbook playbook.yml -e ad_join_password='<pass>'  # domain join
#
# See README.md for the architecture and the deletion procedure.
[defaults]
inventory           = inventory.yml
roles_path          = roles
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = default
result_format       = yaml
interpreter_python  = auto_silent
forks               = 10

[ssh_connection]
pipelining = True
# DSM's old sshd emits a post-quantum-kex warning that can confuse ansible;
# quiet it so output stays parseable.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o LogLevel=ERROR
