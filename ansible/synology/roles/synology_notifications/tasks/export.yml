---
- name: Ensure the export dir exists on the control node
  ansible.builtin.file:
    path: "{{ synology_export_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true

- name: Get live Mail.Conf
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.Notification.Mail.Conf method=get version=2"
  register: mail_get
  changed_when: false
  check_mode: false

- name: Get live SMS.Conf
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.Notification.SMS.Conf method=get version=2"
  register: sms_get
  changed_when: false
  check_mode: false

- name: Get live Push.Conf
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.Notification.Push.Conf method=get version=1"
  register: push_get
  changed_when: false
  check_mode: false

- name: Get live CMS.Conf
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.Notification.CMS.Conf method=get version=2"
  register: cms_get
  changed_when: false
  check_mode: false

- name: Write the live-state snapshot
  ansible.builtin.copy:
    dest: "{{ synology_export_dir }}/{{ inventory_hostname }}-notifications.yml"
    mode: "0600"
    content: |
      mail_raw: {{ mail_get.stdout_lines | to_json }}
      sms_raw: {{ sms_get.stdout_lines | to_json }}
      push_raw: {{ push_get.stdout_lines | to_json }}
      cms_raw: {{ cms_get.stdout_lines | to_json }}
  delegate_to: localhost
