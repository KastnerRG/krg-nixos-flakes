---
- name: Ensure the export dir exists on the control node
  ansible.builtin.file:
    path: "{{ synology_export_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true

- name: List all quotas (synoquota --user-list)
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synoquota --user-list"
  register: quota_userlist
  changed_when: false
  check_mode: false
  failed_when: false

- name: List share quotas (synoquota --share-list)
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synoquota --share-list 2>/dev/null || true"
  register: quota_sharelist
  changed_when: false
  check_mode: false

- name: Write the live-state snapshot
  ansible.builtin.copy:
    dest: "{{ synology_export_dir }}/{{ inventory_hostname }}-quotas.yml"
    mode: "0600"
    content: |
      user_quotas_raw: {{ quota_userlist.stdout_lines | default([]) | to_json }}
      share_quotas_raw: {{ quota_sharelist.stdout_lines | default([]) | to_json }}
  delegate_to: localhost
