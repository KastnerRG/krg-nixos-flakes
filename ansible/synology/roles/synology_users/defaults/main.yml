---
# Declarative spec files consumed by this role (see group_vars/synology.yml for nas_spec_dir).
synology_groups_spec: "{{ nas_spec_dir }}/groups.yml"
synology_users_spec: "{{ nas_spec_dir }}/users.yml"

# Where the exporter writes the live-state snapshot (read by the drift_exporter).
# On the control node (krg-deploy); keep out of git.
synology_export_dir: "/var/lib/krg-deploy/synology-export"

# Secret: map of local-user-name -> password, supplied via ansible-vault or
# -e @secrets.yml. NEVER put passwords in spec/e4e-nas/users.yml.
synology_user_passwords: {}

# Shared admin keys file (nix/keys/admins.json — same one read by
# group_vars/all.yml for `admin_ssh_keys`). The role parses entries with
# `ssh_keys_from: nix/keys/admins.json#<slot>` by re-reading this file and
# slicing the `<slot>` key (e.g. `krg-admin` for krg-prod hosts, `e4e-admin`
# for E4E hardware like e4e-nas).
synology_admin_keys_file: "{{ krg_keys_file }}"
