---
# synology_users — manage LOCAL DSM users + (optionally) LOCAL groups from
# spec/e4e-nas/{users,groups}.yml by wrapping the DSM CLI (synouser/synogroup).
# DSM is not Debian, so ansible.builtin.user/group don't apply. Idempotent +
# --check aware. Human identities come from the AD domain (winbind), NOT this
# role; this role is for the service/break-glass LOCAL accounts (and local
# groups, if the spec opts into type: local).
#
# CROSS-REFERENCE: keep the break-glass admin aligned with nix/users/admin.nix
# and ansible/roles/krg_admin. All three layers read SSH keys from
# nix/keys/admins.json (single source of truth). On this NAS the slot is
# `e4e-admin` (E4E hardware); group_vars/synology.yml overrides
# admin_ssh_keys to that slot.
#
# WHY raw + PATH prefix (validated on the rig 2026-05-27):
#   * DSM ships Python 3.8; modern ansible-core needs >=3.9 on the target for its
#     modules — so we use `raw` (runs over SSH, no python on the target).
#   * synouser/synogroup live in /usr/syno/sbin, which is NOT in root's PATH, so
#     each raw command prepends `{{ syno_path }}` (group_vars/synology.yml).
# Surfaces that need Python on the target (file-write, webapi GET/diff/SET) are
# shipped as standalone scripts via the `script:` module — DSM py3.8 runs them
# fine, just not ansible's MODULE wrapper.

- name: Load the declarative spec
  ansible.builtin.include_vars:
    file: "{{ item.file }}"
    name: "{{ item.name }}"
  loop:
    - { file: "{{ synology_groups_spec }}", name: groups_spec }
    - { file: "{{ synology_users_spec }}", name: users_spec }
  loop_control:
    label: "{{ item.name }}"

# --- Local groups (only when the spec declares type: local) ---------------------
- name: AD-managed groups are not created here (informational)
  ansible.builtin.debug:
    msg: >-
      groups.yml type={{ groups_spec.type | default('ad') }} — group objects come from
      KRG.LOCAL (winbind), not synogroup. Skipping local group creation.
  when: (groups_spec.type | default('ad')) != 'local'

- name: Manage local DSM groups
  when: (groups_spec.type | default('ad')) == 'local'
  block:
    - name: Probe each local group (rc != 0 == missing)
      # DSM CLIs return EXIT 255 for "not found" instead of 1, which collides
      # with SSH's own 255 "connection failed" — ansible's raw: misclassifies
      # that as UNREACHABLE and ignores failed_when: false. Translate 255 → 1
      # before exiting so ansible can distinguish remote-not-found from SSH-died.
      ansible.builtin.raw: |
        PATH={{ syno_path }}:$PATH synogroup --get {{ item.name | quote }} >/dev/null 2>&1
        rc=$?
        [ "$rc" = 255 ] && exit 1 || exit $rc
      register: synogroup_probe
      changed_when: false
      failed_when: false
      check_mode: false
      loop: "{{ groups_spec.groups | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create missing local groups
      ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synogroup --add {{ item.item.name | quote }}"
      when: (item.rc | default(1)) != 0
      changed_when: true
      loop: "{{ synogroup_probe.results }}"
      loop_control:
        label: "{{ item.item.name }}"

# --- Local users (service / break-glass accounts; humans come from AD) ----------
- name: Probe each local user (rc != 0 == missing)
  # See group probe above re: DSM 255-vs-missing — same translation here.
  ansible.builtin.raw: |
    PATH={{ syno_path }}:$PATH synouser --get {{ item.name | quote }} >/dev/null 2>&1
    rc=$?
    [ "$rc" = 255 ] && exit 1 || exit $rc
  register: synouser_probe
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ users_spec.users | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create missing local users
  # synouser --add <name> <password> "<desc>" <expire 0/1> "<email>" <cannot_chg_pw 0/1>
  ansible.builtin.raw: >-
    PATH={{ syno_path }}:$PATH synouser --add {{ item.item.name | quote }}
    {{ (synology_user_passwords[item.item.name] | default('')) | quote }}
    {{ (item.item.description | default('')) | quote }}
    0 {{ (item.item.email | default('')) | quote }} 0
  when: (item.rc | default(1)) != 0
  no_log: true # password is on the command line
  changed_when: true
  loop: "{{ synouser_probe.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# --- Group membership (M1: honor spec `groups:` field) --------------------------
# `synouser --add` doesn't accept a group list, so users land in `users` only.
# `synogroup --memberadd <group> <user> [...users]` (DSM 7.x) adds members
# idempotently — adding an already-member is a no-op (rc=0, "already in").
# We iterate per-(user, group) so each pair is one raw call and the loop
# label is human-readable.
#
# WHY this matters: e4e-automation is the Terraform `dsm_user`; without
# `administrators` group membership it cannot drive the synology-community
# provider. e4e-admin without `administrators` is a non-admin break-glass
# (useless). The reviewer flagged the silent-ignore in 4577021512 (M1).
- name: Build flat (user, group) pairs for membership add
  ansible.builtin.set_fact:
    _user_group_pairs: >-
      {{
        users_spec.users | default([])
        | subelements('groups', skip_missing=True)
        | map('list') | list
      }}
  no_log: true

- name: Apply group membership (synogroup --memberadd; idempotent at DSM level)
  # Same 255 translation as the probes — a real memberadd failure (group or
  # user doesn't exist) returns 255 on DSM, which would be misclassified as
  # UNREACHABLE. Translate so failed_when fires normally and the operator
  # sees the real error instead of a spurious connection error.
  ansible.builtin.raw: |
    PATH={{ syno_path }}:$PATH synogroup --memberadd {{ item[1] | quote }} {{ item[0].name | quote }}
    rc=$?
    [ "$rc" = 255 ] && exit 1 || exit $rc
  loop: "{{ _user_group_pairs }}"
  loop_control:
    label: "{{ item[0].name }} -> @{{ item[1] }}"
  register: group_memberadd
  # DSM prints "already in" / "is a member" on no-op; suppress CHANGED for
  # those so a converged box doesn't spam. Anything else (success on a real
  # add, or actual error) keeps CHANGED/FAIL semantics.
  changed_when:
    - group_memberadd.rc == 0
    - "'already' not in (group_memberadd.stdout | default('') | lower)"
    - "'is a member' not in (group_memberadd.stdout | default('') | lower)"
  failed_when: group_memberadd.rc != 0

# --- Disable built-in attack-surface accounts (admin, guest) — runbook §1 -------
# `synouser --enum disabled` lists already-disabled accounts so re-runs are
# no-ops (no CHANGED spam on a converged box). `synouser --get` confirms
# existence (some DSM installs lack `guest`).
- name: Enumerate already-disabled accounts (so re-runs are no-ops)
  # Same 255-vs-failure translation as the --get probes above — `synouser
  # --enum disabled` may return 255 if the argument isn't supported on this
  # DSM version or the disabled set is empty. The downstream parser tolerates
  # an empty/missing result (defaults to []); we just need rc!=0 to NOT trip
  # ansible's UNREACHABLE handler.
  ansible.builtin.raw: |
    PATH={{ syno_path }}:$PATH synouser --enum disabled 2>&1
    rc=$?
    [ "$rc" = 255 ] && exit 1 || exit $rc
  register: disabled_enum
  changed_when: false
  failed_when: false
  check_mode: false

- name: Probe each built-in account before disabling
  # Same 255-vs-missing translation as the local-user probe above. Built-in
  # `guest` is missing on some DSM installs and must report as "not present"
  # (rc=1), not "host unreachable" (rc=255).
  ansible.builtin.raw: |
    PATH={{ syno_path }}:$PATH synouser --get {{ item | quote }} >/dev/null 2>&1
    rc=$?
    [ "$rc" = 255 ] && exit 1 || exit $rc
  register: builtin_probe
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ users_spec.disable_builtin | default([]) }}"
  loop_control:
    label: "{{ item }}"

# Normalize `synouser --enum disabled` output to a flat list. The DSM CLI
# prints `User name ...` as a header then one name per line (best-known); we
# strip blanks + the header. If parsing produces an empty list on a box that
# DOES have disabled accounts, we'll re-disable them — DSM treats that as a
# no-op, so safe direction. The drift exporter is the right tool to catch a
# format change.
- name: Parse already-disabled account list
  ansible.builtin.set_fact:
    disabled_accounts: >-
      {{ (disabled_enum.stdout_lines | default([]))
         | map('trim')
         | reject('equalto', '')
         | reject('match', '^User\\s+name')
         | list }}

- name: Disable built-in accounts (admin/guest) — only when present and currently enabled
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synouser --disable {{ item.item | quote }}"
  when:
    - (item.rc | default(1)) == 0             # account exists
    - item.item not in disabled_accounts       # not already disabled (idempotent)
  changed_when: true
  loop: "{{ builtin_probe.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- DSM Home Service (required for SSH + AD homes) — runbook §1 step 5 + §2 ----
- name: Apply DSM Home Service (User.Home set — full-object; partial = err 2001)
  ansible.builtin.script: >-
    apply_users.py home
    --enable {{ users_spec.home_service.enable | default(true) }}
    --include-domain-users {{ users_spec.home_service.include_domain_users | default(true) }}
    {{ '--check' if ansible_check_mode else '' }}
  register: home_apply
  changed_when: "'CHANGED' in home_apply.stdout or 'WOULD-CHANGE' in home_apply.stdout"
  failed_when: "home_apply.rc != 0 or 'FAIL' in home_apply.stdout"
  check_mode: false

# --- Authorized SSH keys from nix/keys/admins.json ------------------------------
# For each user with `ssh_keys_from: nix/keys/admins.json#<slot>`, write the keys
# atomically into /var/services/homes/<user>/.ssh/authorized_keys (mode 0600,
# parent dir 0700, owner = the user). Required for synology_ssh to lock down
# password auth without locking us out. SKIPS api_only accounts.
- name: Load shared admin keys map (single source of truth — nix/keys/admins.json)
  ansible.builtin.set_fact:
    _all_admin_keys: "{{ lookup('file', synology_admin_keys_file) | from_json }}"
  run_once: true
  no_log: true

- name: Drop authorized_keys for each user with ssh_keys_from set
  ansible.builtin.script: >-
    apply_users.py authorized-keys
    --username {{ item.name | quote }}
    --keys {{ (_all_admin_keys[(item.ssh_keys_from | regex_replace('^.*#', ''))]
              | default([])) | to_json | quote }}
    {{ '--check' if ansible_check_mode else '' }}
  register: keys_apply
  changed_when: "'CHANGED' in keys_apply.stdout or 'WOULD-CHANGE' in keys_apply.stdout"
  failed_when: "keys_apply.rc != 0 or 'FAIL' in keys_apply.stdout"
  check_mode: false
  no_log: true   # the keys themselves are on the cmdline
  when:
    - item.ssh_keys_from is defined
    - not (item.api_only | default(false))
  loop: "{{ users_spec.users | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

# --- Drift export (read-only) — only with `--tags export` -----------------------
- name: Export live state for drift detection
  ansible.builtin.import_tasks: export.yml
  tags: [export, never]
