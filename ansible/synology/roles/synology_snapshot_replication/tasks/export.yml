---
- name: Ensure the export dir exists on the control node
  ansible.builtin.file:
    path: "{{ synology_export_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true

- name: Get Snapshot Replication schedules per share (Share.Snapshot list)
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.Share.Snapshot method=list version=1"
  register: snap_list
  changed_when: false
  check_mode: false
  failed_when: false

- name: Write the live-state snapshot
  ansible.builtin.copy:
    dest: "{{ synology_export_dir }}/{{ inventory_hostname }}-snapshots.yml"
    mode: "0600"
    content: |
      snapshot_list_raw: {{ snap_list.stdout_lines | default([]) | to_json }}
  delegate_to: localhost
