---
- name: Ensure the export dir exists on the control node
  ansible.builtin.file:
    path: "{{ synology_export_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true

- name: Get Security Advisor config (SecurityScan.Main)
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.SDS.SecurityScan.Main method=get version=1"
  register: sa_main_get
  changed_when: false
  check_mode: false

- name: Get last-scan status (SecurityScan.Operation)
  ansible.builtin.raw: "PATH={{ syno_path }}:$PATH synowebapi --exec api=SYNO.Core.SecurityScan.Operation method=get version=1"
  register: sa_op_get
  changed_when: false
  check_mode: false
  failed_when: false  # Operation.get may not exist; tolerate

- name: Write the live-state snapshot
  ansible.builtin.copy:
    dest: "{{ synology_export_dir }}/{{ inventory_hostname }}-security-advisor.yml"
    mode: "0600"
    content: |
      main_raw: {{ sa_main_get.stdout_lines | to_json }}
      operation_raw: {{ sa_op_get.stdout_lines | default([]) | to_json }}
  delegate_to: localhost
