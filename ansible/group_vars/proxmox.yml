# Variables for the Proxmox hypervisor hosts.

# --- SSH access (key-only) ---------------------------------------------------
# Public keys authorized for root. After hardening, password auth is OFF and
# these become the ONLY way in — make sure at least one is correct and you hold
# the matching private key BEFORE running the play, or you will lock yourself
# out (recoverable only via the Proxmox console).
# REPLACE the example below with the real ops key(s).
proxmox_admin_ssh_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF2Z7LbaDPTNkdnuvFivXTUx8X9gU0ZyWrrYBH7KSmG3 chris@chris-laptop"

# Root login policy: "prohibit-password" = key-only root (PVE relies on root for
# cluster ops). Use "no" only once a separate sudo-capable admin user exists.
proxmox_ssh_permit_root: "prohibit-password"

# Restricting pubkey algorithms to ed25519-only matches the NixOS guest policy,
# but PVE *cluster* nodes may SSH to each other with RSA keys — leaving this
# false avoids breaking inter-node SSH. Flip to true only on standalone hosts
# (or after confirming cluster keys are ed25519).
proxmox_ssh_restrict_algorithms: false

# --- Trusted networks --------------------------------------------------------
# Admin/management CIDRs. Used to whitelist fail2ban and (in the firewall role)
# to source-restrict SSH + the web UI. REPLACE with the real admin/VPN subnets.
krg_trusted_nets:
  - "137.110.161.0/24"      # local subnet (krg-ldap lives here)
  # - "10.0.0.0/24"         # e.g. admin VPN / ops subnet

krg_monitoring_host: "132.239.95.67"

# --- fail2ban ----------------------------------------------------------------
proxmox_fail2ban_bantime:  "1h"
proxmox_fail2ban_findtime: "10m"
proxmox_fail2ban_maxretry: 3
# Never ban ourselves or the trusted nets.
proxmox_fail2ban_ignoreip: "{{ ['127.0.0.1/8', '::1'] + krg_trusted_nets }}"
