name: Refresh geoIP CIDR lists

# Monthly refresh of nix/networks/geoip-<cc>-{v4,v6}.json from MaxMind
# GeoLite2-Country. Mirrors flake.lock semantics: data file lives in the
# repo, refresh runs in CI, opens a PR with the diff for review. Per-host
# rebuilds pick up the new data on the next nightly autoUpgrade after merge.
#
# Setup (one-time, operator-side):
#   1. Free MaxMind account at https://www.maxmind.com/en/geolite2/signup
#   2. Generate a license key in account settings
#   3. Add as repo secret: Settings → Secrets and variables → Actions
#      → New repository secret → MAXMIND_LICENSE_KEY=<key>
#   4. (Optional) tighten the cron cadence below if monthly drift matters
#
# Rejected designs (see issue #74, PR #90 thread):
#   * krg-deploy systemd timer that auto-commits + pushes — needs
#     OpenBao + git deploy creds + flake-check at runtime; chicken-and-egg
#     on fresh deploys (empty JSON → SSH locked down until first run).
#     The flake.lock pattern (data in repo, PR for review) sidesteps
#     all of that and matches how we already handle nixpkgs updates.
on:
  schedule:
    # 04:00 UTC on the 1st of every month (~21:00 PT day before).
    # Off-peak so a manual review in the morning catches a fresh PR.
    - cron: '0 4 1 * *'
  workflow_dispatch:   # let an operator trigger a refresh out-of-band

# This workflow opens PRs against itself; needs write on contents + PRs.
# pull-requests:write is required for `gh pr create`; contents:write is
# required to push the refresh branch.
permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh + open PR if changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Default token has push permission per `permissions:` above.
          # No PAT needed; the auto-PR triggers build.yml on the new
          # branch the same as any other PR (which runs nix flake check
          # — catches corrupt MaxMind data before merge).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh geoIP CIDR lists from MaxMind
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MAXMIND_LICENSE_KEY:-}" ]; then
            echo "::error::MAXMIND_LICENSE_KEY secret not configured."
            echo "::error::Set it at Settings → Secrets and variables → Actions."
            exit 1
          fi
          python3 nix/modules/security/firewall-geoip/fetch-geoip.py \
            --countries US \
            --output-dir nix/networks

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- nix/networks/geoip-*.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No CIDR changes since last refresh — skipping PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            v4_count=$(jq '.cidrs | length' nix/networks/geoip-us-v4.json)
            v6_count=$(jq '.cidrs | length' nix/networks/geoip-us-v6.json)
            echo "v4_count=$v4_count" >> "$GITHUB_OUTPUT"
            echo "v6_count=$v6_count" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update refresh PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V4_COUNT: ${{ steps.diff.outputs.v4_count }}
          V6_COUNT: ${{ steps.diff.outputs.v6_count }}
        run: |
          set -euo pipefail
          # Deterministic branch name — force-push semantics mean there's
          # always at most ONE open auto-refresh PR. A manual workflow_dispatch
          # while a refresh PR is already open just updates that PR with
          # newer MaxMind data; the operator sees the consolidated diff.
          branch="auto/refresh-geoip"
          git config user.name  "krg-bot"
          git config user.email "noreply@krg.ucsd.edu"
          git switch -C "$branch"
          git add nix/networks/geoip-us-v4.json nix/networks/geoip-us-v6.json
          git commit -m "chore(geoip): monthly refresh from MaxMind GeoLite2-Country

          v4: $V4_COUNT CIDRs
          v6: $V6_COUNT CIDRs

          Auto-generated by .github/workflows/refresh-geoip.yml.
          Reviewer: confirm the diff shape looks plausible (typical
          monthly delta is a few hundred CIDRs added/removed as MaxMind
          updates its database from registry data); merging triggers
          a fleet-wide picks-up-on-next-autoUpgrade rollout."
          git push --force-with-lease origin "$branch"

          # Idempotent: if a PR already exists for this branch, the
          # second `gh pr create` errors. Catch + report.
          if ! gh pr list --head "$branch" --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(geoip): monthly refresh from MaxMind GeoLite2-Country" \
              --body "Automated refresh of \`nix/networks/geoip-us-{v4,v6}.json\`.

          - v4: $V4_COUNT CIDRs
          - v6: $V6_COUNT CIDRs

          Same shape as a \`flake.lock\` bump — reviewer confirms the diff
          isn't catastrophic (typical monthly delta is a few hundred CIDRs).
          The repo's \`build.yml\` runs \`nix flake check --all-systems\`
          on this PR, which catches a corrupted JSON before merge.

          Merging triggers a fleet-wide pickup on the next nightly
          autoUpgrade — every host's geoIP-gated ports get the refreshed
          US source set.

          ## What to look at in the diff

          - **Stat line** — a few hundred net adds/removes is normal,
            tens of thousands is suspicious.
          - **Spot-check known prefixes** — \`137.110.0.0/16\` (UCSD)
            should remain present; \`8.8.8.0/24\` (Google US) varies
            by month but stays in some form (often aggregated upward).
          - **Don't review line-by-line** — that's not a useful
            human-review surface (same as flake.lock).

          ## If the diff is weird

          Open the workflow run logs (Actions tab → Refresh geoIP CIDR
          lists). The fetch step prints the count and a checksum.
          MaxMind occasionally publishes a malformed CSV row; the
          parser skips bad rows silently (by design — one bad row
          shouldn't 502 the whole refresh)." \
              --label "automated" 2>&1 || echo "::warning::Couldn't create PR (likely already exists; force-pushed branch updates it)."
          else
            existing=$(gh pr list --head "$branch" --json number --jq '.[0].number')
            echo "::notice::Updated existing PR #$existing with newer data."
          fi
