server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Persisted via a named volume in compose.grafana.yml so the file survives
  # container restarts. Without this, Promtail loses its place on every restart
  # and re-reads all of /var/log from the beginning, causing an OOM loop.
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    # tail_from_end: skip pre-existing log history on first boot (no positions
    # file yet) so Promtail doesn't buffer the entire /var/log backlog into RAM
    # and OOM. After first run the positions file records the offset, so
    # catch-up after a restart reads only the gap — not the full history.
    tail_from_end: true
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log

  # NixOS: replaced ansible_deploy_logs with systemd journal scraping.
  # The compose.grafana.yml mounts ./ansible.log as /tmp/ansible_deploy.log;
  # Docker will create an empty file there so this job produces no data.
  - job_name: nixos_deploy_logs
    journal:
      max_age: 12h
      labels:
        job: nixos_rebuild
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
