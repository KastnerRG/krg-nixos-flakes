[server]
root_url = https://dashboard.waiter.ucsd.edu

[security]
admin_user = e4eadmin
# admin_password set via GF_SECURITY_ADMIN_PASSWORD__FILE secret

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.basic]
enabled = true

# GitHub OAuth (add client ID/secret to .secrets/ — do not hardcode here)
[auth.github]
enabled = false
allow_sign_up = true
auto_login = false
; client_id = <from .secrets/grafana_github_oauth.env>
; client_secret = <from .secrets/grafana_github_oauth.env>
; allowed_organizations = KastnerRG

[users]
auto_assign_org_role = Viewer

[log]
mode = console
level = info

[analytics]
reporting_enabled = false
check_for_updates = false
