  # - compose.mlflow.yml

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    ports:
      # Public ingress — bound to all interfaces explicitly. The krg.docker daemon
      # default binds unspecified publishes to loopback (so DBs/exporters don't leak
      # past the firewall); 80/443 must override that to serve the perimeter.
      - 0.0.0.0:80:80
      - 0.0.0.0:443:443
      # 8080 (Traefik API/metrics) intentionally NOT published: it exposed /metrics
      # on the host's external interface. Prometheus scrapes traefik:8080 over the
      # docker network instead (add prometheus to traefik_proxy when re-enabled).
      # - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-data/letsencrypt:/letsencrypt:z
    command:
      - "--log.level=INFO"
      # - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.forwardedHeaders.insecure=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=e4e@ucsd.edu"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--providers.docker.network=traefik_proxy"
      - "--metrics.prometheus=true"
    networks:
      authentik:
      traefik_proxy:
        aliases:
          - auth.fabricant.ucsd.edu
          # Aliases for the temporarily-disabled stacks — re-enable alongside their
          # compose includes above:
          # - s3.fabricant.ucsd.edu
          # - labeler.e4e.ucsd.edu
          # - orchestrator.fishsense.e4e.ucsd.edu
          # - data.smartfin.e4e.ucsd.edu
          # - wiki.fabricant.ucsd.edu
          # - roster.e4e.ucsd.edu
          # - github-sync.e4e.ucsd.edu
          # - mlflow.krg.ucsd.edu

