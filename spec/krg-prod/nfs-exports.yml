# NFS exports on e4e-nas — declarative source of truth.
# Consumed by the `synology_nfs` Ansible role; exporter reads the live rules back.
# Seeded from the build sheet (docs/e4e-nas-dsm.md): one export today.
#
# ⚠️ uid MISMATCH CAVEAT (runbook §2): DSM/winbind maps AD identities with RID
# mapping; the rest of the fleet (SSSD) uses algorithmic mapping → the same AD user
# gets different uid/gid on the NAS vs Linux clients. SMB is SID-based (fine); NFS
# is uid-based and will NOT line up. Verify uids on the fabricant side before
# trusting this export.

exports:
  - share: fabricant-prod-share
    path: /volume2/fabricant-prod-share
    clients:
      - host: fabricant-prod.ucsd.edu
        # TODO confirm exact options against the live rule (squash / security / async).
        # Build sheet shows rw enabled; fill the rest from `synonfs`/the live export.
        options:
          rw: true
          # squash: root_squash | no_root_squash   # TODO confirm
          # security: sys                            # TODO confirm
          async: false
