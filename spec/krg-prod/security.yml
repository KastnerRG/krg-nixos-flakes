# DSM security perimeter for e4e-nas — firewall + auto-block.
# Source of truth for the post-rebuild state. Values CONFIRMED / DRIFT-MARKED from the
# 2026-05-28 live pre-reset capture (archived locally). Defense-in-depth: this is the
# in-DSM layer, complementary to the Proxmox/in-guest layers handled elsewhere.
#
# IaC home: `synology_api` escape hatch in `terraform/e4e-nas/security.tf` calling
# SYNO.Core.Security.Firewall set + Firewall.Profile set + AutoBlock set +
# AutoBlock.Rules create/upload. The Firewall API surface (per .lib) is:
#   Firewall      get/set                          (enable + active profile_name)
#   Firewall.Conf get/set                          (port_check, etc.)
#   Firewall.Adapter      list                     (adapter_names: eth0..eth3, vpn, …)
#   Firewall.Profile      get/list/clone/create/delete/rename/set
#   Firewall.Rules        load + save_start/save_status/save_stop  (two-phase save)
#   Firewall.Geoip        get/list

firewall:
  enable: true
  active_profile: default
  port_check: true

  profiles:
    # The default profile holds the per-rule list. Rules detail wasn't captured cleanly
    # (FW-PROFILE-DEFAULT/RULES-LOAD errored 120 — wrong param name; follow-up needed
    # with profile_id= or rule_set= per the .lib's load semantics).
    # TODO: capture the actual rule list (sources → ports/protocols, by adapter), then
    # encode here. Adapters covered: eth0 (LAN), eth1/2/3 (link-down today), global,
    # pppoe, vpn, wlan0.
    default:
      adapters: [eth0, global]    # what the live profile actually scopes; confirm + extend
      rules: []                   # TODO from live load

  # Geoip blocking — capture errored (114); follow-up to grab; spec target TBD.
  # geoip: { enable: false }

auto_block:
  # Live: 3 attempts in 1440 min (24h), no expiry (0). Aggressive — matches the breach-
  # driven hardening posture. Consider expire_day to age out noisy blockers.
  enable: true
  attempts: 3
  within_mins: 1440
  expire_day: 0                   # 0 = never; safer: 7-30 to age noisy entries

  # Allow-list (never block) + deny-list (always block). Deny/allow downloads errored
  # 5100 — wrong method/param; defer the static list capture.
  # Recommendation: source allow-list by REFERENCE from nix/networks/trusted.json
  # rather than re-listing IPs here (same DRY pattern as in-guest firewall).
  allow_list_ref: nix/networks/trusted.json   # IPSets: ucsd, sealab, monitoring
  deny_list: []                                # TODO: confirm via follow-up capture

