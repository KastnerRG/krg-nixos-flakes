# Shared folders on e4e-nas — declarative source of truth.
# Consumed by the `synology_shares` Ansible role (wraps `synoshare`); the paired
# exporter reads `synoshare --enum`/`--get` back into this shape for drift detection.
# Seeded from the build sheet (docs/e4e-nas-dsm.md). Git is truth; UI = drift (ADR 0001).
#
# NOT listed here (auto-created by DSM/packages — do NOT hand-create): NetBackup,
# photo, web, homes.
#
# Per-share ACLs live in acls.yml, not here. Per-share DSM flags (recycle bin,
# visibility, etc.) default below; confirm exceptions against the live box.

defaults:
  btrfs: true            # required for snapshots (ADR/runbook)
  recycle_bin: true
  browseable: true       # most shares were visible (notHideShare=1); set false per-item to hide

